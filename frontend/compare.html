<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparison Tool | Digital Shadow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/date-fns@3.0.0/cdn.min.js"></script>
    <link rel="stylesheet" href="css/custom.css">
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen">

    <nav class="sticky top-0 z-40 bg-gray-800 border-b border-gray-700 shadow-lg no-print">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-4">
                    <a href="dashboard.html" class="text-primary font-bold">DIGITAL SHADOW</a>
                    <div class="h-4 w-px bg-gray-700"></div>
                    <span class="text-sm text-gray-400">Comparison Tool</span>
                </div>
                <div class="flex items-center space-x-8">
                    <a href="dashboard.html"
                        class="text-gray-400 hover:text-white px-1 py-4 text-sm font-medium transition-colors">Dashboard</a>
                    <a href="compare.html"
                        class="text-white border-b-2 border-primary px-1 py-4 text-sm font-medium">Compare</a>
                    <a href="performances/index.html"
                        class="text-gray-400 hover:text-white px-1 py-4 text-sm font-medium transition-colors">📈
                        Performances</a>
                    <a href="admin.html"
                        class="text-gray-400 hover:text-white px-1 py-4 text-sm font-medium transition-colors">Admin</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <!-- Mode Selector -->
        <div class="flex gap-1 bg-gray-800 p-1 rounded-xl w-fit mb-8 border border-gray-700">
            <button class="mode-tab px-6 py-2 rounded-lg text-sm font-bold transition-all bg-primary text-white"
                data-mode="bar-vs-bar">Bar vs Bar</button>
            <button
                class="mode-tab px-6 py-2 rounded-lg text-sm font-bold transition-all text-gray-400 hover:text-white"
                data-mode="yoy">Year vs Year</button>
        </div>

        <!-- Inputs Section -->
        <section class="glass p-6 rounded-2xl mb-8">
            <div id="bar-vs-bar-inputs" class="flex flex-wrap gap-6 items-end">
                <div class="min-w-[300px] flex-1">
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-4 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                        </svg>
                        Selection (Max 8)
                    </label>
                    <div id="bar-selector" class="space-y-6 p-1">
                        <!-- Checkboxes populated by JS -->
                        <div class="animate-pulse flex gap-2">
                            <div class="h-8 w-24 bg-gray-800 rounded-lg"></div>
                            <div class="h-8 w-24 bg-gray-800 rounded-lg"></div>
                        </div>
                    </div>
                </div>
                <div class="min-w-[300px]">
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Date Range</label>
                    <div class="flex gap-2">
                        <input type="date" id="start-date"
                            class="flex-1 bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm">
                        <input type="date" id="end-date"
                            class="flex-1 bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm">
                    </div>
                </div>
                <button id="compare-bar-btn"
                    class="bg-primary hover:bg-blue-700 text-white font-bold py-2 px-8 rounded-lg transition-all h-[42px]">Compare
                    Data</button>
            </div>

            <div id="yoy-inputs" class="hidden flex flex-wrap gap-6 items-end">
                <div class="min-w-[200px]">
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Select Bar</label>
                    <select id="yoy-bar-select"
                        class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm outline-none">
                        <!-- Options -->
                    </select>
                </div>
                <div class="flex gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Year 1</label>
                        <select id="year1" class="bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm">
                            <option value="2024">2024</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Year 2</label>
                        <select id="year2" class="bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm">
                            <option value="2025" selected>2025</option>
                        </select>
                    </div>
                </div>
                <button id="compare-yoy-btn"
                    class="bg-primary hover:bg-blue-700 text-white font-bold py-2 px-8 rounded-lg transition-all h-[42px]">Run
                    YOY Analysis</button>
            </div>
        </section>

        <!-- Results Section -->
        <div id="compare-results" class="hidden animate-in fade-in duration-500">
            <!-- Summary Grid -->
            <div id="compare-summary" class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <!-- Populated by JS -->
            </div>

            <!-- Main Comparison Chart -->
            <div class="glass p-6 rounded-2xl mb-8">
                <h4 id="chart-title" class="text-lg font-bold mb-6">Comparative Performance</h4>
                <div class="h-96 w-full">
                    <canvas id="compare-chart"></canvas>
                </div>
            </div>

            <!-- Detail Table -->
            <div class="glass rounded-2xl overflow-hidden">
                <div class="table-container">
                    <table class="w-full text-left">
                        <thead id="compare-table-head"
                            class="bg-gray-800 text-gray-400 text-[10px] uppercase font-bold">
                            <!-- Headers -->
                        </thead>
                        <tbody id="compare-table-body" class="divide-y divide-gray-800 text-sm">
                            <!-- Rows -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="empty-state" class="flex flex-col items-center justify-center py-20 text-gray-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-4 opacity-20" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
            </svg>
            <p>Select parameters and click "Compare" to view analysis</p>
        </div>
    </main>

    <script type="module" src="js/compare.js"></script>
</body>

</html>
